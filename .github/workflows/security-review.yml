name: Security Review & Zero-Critical Gate

on:
  push:
    branches: [ main, master, gh-pages ]
  pull_request:
    branches: [ main, master, gh-pages ]
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python Openpyxl
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Security Audit Script
        run: |
          python scripts/generate_security_review.py

      - name: Enforce Zero-Critical Quality Gate
        run: |
          CRITICAL_COUNT=$(grep -c "Critical Severity Vulnerabilities.*[1-9]" web-executive-summary.md || echo "0")
          echo "Critical Vulnerability Count: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "❌ Zero-Critical Security Policy Violation: Critical vulnerabilities found!"
            exit 1
          fi
          echo "🟢 Zero-Critical Quality Gate PASSED cleanly."

      - name: Publish Step Summary
        run: |
          cat web-executive-summary.md >> $GITHUB_STEP_SUMMARY
