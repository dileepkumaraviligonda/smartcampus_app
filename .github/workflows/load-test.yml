name: API Load Testing (100 VUs / 1m)

on:
  push:
    branches: [ main, master, gh-pages ]
  pull_request:
    branches: [ main, master, gh-pages ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup k6 Load Tester
        uses: grafana/setup-k6-action@v1

      - name: Execute Python Load Test Suite (100 VUs / 1m)
        run: |
          python scripts/run_load_test.py

      - name: Parse load test metrics with defensive parser
        run: |
          node scripts/parseK6Summary.js
